services:
  postgres:
    image: postgres:17-alpine
    container_name: chat-portal-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT_FORWARD:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-chat_portal}
      POSTGRES_USER: ${DB_USERNAME:-chat_portal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-chat_portal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: chat-portal-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
